services:
  # 🐍 BACKEND: FastAPI + PostgreSQL (Supabase)
  - type: web
    name: senatecnologo-backend
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false

  # ⚛️ FRONTEND: React + Vite
  - type: web
    name: senatecnologo-frontend
    runtime: static # 🔥 Cambiamos 'env' por 'runtime' para que Render lo reconozca como Static Site
    # No ponemos 'plan' porque los Static Sites son siempre gratuitos en Render
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        sync: false
